<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Profiles</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 20px;
    }
    .profile-container {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
    }
    .profile-card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      width: 300px;
      margin: 15px;
      text-align: center;
      padding: 20px;
    }
    .profile-card img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
    }
    .profile-card h2 {
      margin: 10px 0 5px;
      font-size: 20px;
      color: #333;
    }
    .profile-card h4 {
      margin: 5px 0 15px;
      font-size: 16px;
      color: #777;
    }
    .profile-card p {
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Team Hommies</h1>
  <div class="profile-container">
    <!-- Profile 1 -->
    <div class="profile-card">
      <img src="person1.jpg" alt="Person 1">
      <h2>Moanori Amri</h2>
      <h4>Chief Executive Officer</h4>
      <p>nori leads the company with over 15 years of experience in strategic management and innovation.</p>
    </div>
    <!-- Profile 2 -->
    <div class="profile-card">
      <img src="person2.jpg" alt="Person 2">
      <h2>Titoka T Chishi</h2>
      <h4>Head of Homiies</h4>
      <p>Titoka specializes in being good.</p>
    </div>
    <!-- Profile 3 -->
    <div class="profile-card">
      <img src="person3.jpg" alt="Person 3">
      <h2>Tsuhto Dozo</h2>
      <h4>captain</h4>
      <p>Tsuhto Dozo ensures sustainable growth.</p>
    </div>
  </div>
</body>
</html>
